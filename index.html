<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kichong.xyz</title>
    <style>
        /* Overall Page Styling */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #333;
            margin: 0;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        
        /* Symbols Container */
        .symbols {
            display: grid;
            grid-template-areas: 
                ". triangle ."
                "square . circle"
                ". x .";
            gap: 50px; /* Increased spacing between symbols */
            text-align: center;
        }

        /* Symbol Styling */
        .symbol {
            width: 100px; /* Slightly larger symbols */
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50%; /* Only affects circle */
            color: white;
        }

        /* Individual Symbol Customizations with PlayStation Colors */
        .triangle {
            grid-area: triangle;
            color: #3edc81; /* Light green */
        }

        .square {
            grid-area: square;
            background-color: #27a2f4; /* Light blue */
            color: white;
        }

        .circle {
            grid-area: circle;
            background-color: #e83a45; /* Light red */
            color: white;
        }

        .x {
            grid-area: x;
            color: #bd8cbf; /* Light purple */
        }
    </style>
</head>
<body>
    <div class="symbols">
        <a href="link1.html" class="symbol triangle">▲</a>
        <a href="link2.html" class="symbol square">■</a>
        <a href="link3.html" class="symbol circle">●</a>
        <a href="link4.html" class="symbol x">×</a>
    </div>
</body>
</html>
